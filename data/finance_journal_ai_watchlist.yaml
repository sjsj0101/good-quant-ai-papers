source:
  name: EDITH local literature corpus
  checked_on: 2026-07-13
  search_scope: JF, JFE, and RFS records available in the local EDITH corpus
  search_methods:
    - EDITH literature CLI BM25 search with journal filters
    - SQLite read-only screening of the EDITH v_papers view
  journals:
    - code: JF
      name: The Journal of Finance
      local_records: 3229
      local_year_range: 1990-2026
    - code: JFE
      name: Journal of Financial Economics
      local_records: 3224
      local_year_range: 1990-2026
    - code: RFS
      name: The Review of Financial Studies
      local_records: 2700
      local_year_range: 1955-2026
  notes:
    - No internet search was used for this watchlist pass.
    - The year field below is the EDITH local corpus year. A few records have year_needs_review when the local year appears inconsistent with the DOI/title context.
    - This file is intentionally separate from data/papers.yaml, whose schema is limited to top-computer-science conference records.

